<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Auth — Kwento Tales Publisher</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 24px; }
  h1 { font-size: 20px; }
  .code-box { background: #f0f0f0; border-radius: 6px; padding: 16px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 16px 0; }
  .error { color: #c00; }
  button { padding: 8px 16px; cursor: pointer; }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  if (code) {
    document.write('<h1>✓ Authorised</h1><p>Copy the code below and paste it into your terminal:</p><div class="code-box" id="code">' + code + '</div><button onclick="navigator.clipboard.writeText(document.getElementById(\'code\').textContent).then(()=>this.textContent=\'Copied!\')">Copy code</button><p style="color:#666;font-size:13px;margin-top:24px">You can close this tab after copying.</p>');
  } else if (error) {
    document.write('<h1 class="error">Authorisation failed</h1><p>' + (params.get('error_description') || error) + '</p>');
  } else {
    document.write('<h1 class="error">No code received</h1>');
  }
</script>
</body>
</html>
